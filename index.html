<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Interview Prep" />
  <title>Developer Interview Prep</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <button id="menuBtn" class="icon-btn mobile-only" aria-label="Open question list">☰</button>
    <div class="brand">
      <strong>Developer Interview Prep</strong>
      <span id="statusText">Offline-ready</span>
    </div>
    <div class="top-actions">
      <button id="fontBtn" class="icon-btn" aria-label="Change text size">A↕</button>
      <button id="themeBtn" class="icon-btn" aria-label="Toggle theme">◐</button>
    </div>
  </header>

  <div class="app-shell">
    <aside id="sidebar" class="sidebar">
      <div class="search-wrap">
        <input id="searchInput" type="search" placeholder="Search questions or keywords…" autocomplete="off" />
      </div>

      <div id="categoryTabs" class="tabs"></div>

      <div class="filter-row">
        <button id="allBtn" class="small-btn active">All</button>
        <button id="bookmarksBtn" class="small-btn">★ Saved</button>
      </div>

      <div id="keywordCloud" class="keyword-cloud"></div>
      <div id="questionList" class="question-list"></div>
    </aside>

    <main class="content">
      <div id="emptyState" class="empty-state">
        <h1>Interview reference</h1>
        <p>Select a question from the left. Search works across titles, keywords, summaries, and full answers.</p>
      </div>

      <article id="answerCard" class="answer-card hidden">
        <div class="answer-head">
          <div>
            <div id="breadcrumb" class="breadcrumb"></div>
            <h1 id="answerTitle"></h1>
          </div>
          <button id="bookmarkBtn" class="bookmark-btn" aria-label="Save question">☆</button>
        </div>

        <div id="answerKeywords" class="answer-keywords"></div>

        <section class="quick-box">
          <h2>Quick answer</h2>
          <p id="shortAnswer"></p>
        </section>

        <section class="full-answer">
          <h2>Expanded answer</h2>
          <div id="fullAnswer"></div>
        </section>

        <details id="notesDetails" class="notes">
          <summary>
            <span>My notes</span>
            <small id="notesStatus">Saved only on this device</small>
          </summary>
          <div class="notes-body">
            <textarea id="notesBox" placeholder="Add your own example, wording, or reminder…"></textarea>
          </div>
        </details>

        <div class="nav-buttons">
          <button id="prevBtn">← Previous</button>
          <button id="nextBtn">Next →</button>
        </div>
      </article>
    </main>
  </div>

  <div id="overlay" class="overlay hidden"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
